services:
  db:
    image: postgres:16-alpine
    container_name: concert-bot-db
    environment:
      POSTGRES_DB: concert_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - concert_bot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d concert_bot"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  concert_bot_pgdata:
